      order: 2
    model_info: *model-info-medium
  - model_name: "tier2"
    litellm_params:
      <<: *provider-gemini2
      model: "gemini/gemini-2.5-flash"
      order: 2
    model_info: *model-info-medium
  - model_name: "tier2"
    litellm_params:
      <<: *provider-gemini3
      model: "gemini/gemini-2.5-flash"
      order: 2
    model_info: *model-info-medium
  - model_name: "tier2"
    litellm_params:
      <<: *provider-azure1
      model: "azure_ai/gpt-5.2-chat"
