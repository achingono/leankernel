
# YAML anchors for shared model_info and provider credential blocks.
x-model-info:
  small:  &model-info-small  { max_tokens: 8192,  mode: chat, supports_function_calling: true }
  medium: &model-info-medium { max_tokens: 32768, mode: chat, supports_function_calling: true }
  large:  &model-info-large  { max_tokens: 65536, mode: chat, supports_function_calling: true }

x-providers:
  groq1:    &provider-groq1    { api_key: "os.environ/GROQ_API_KEY" }
  groq2:    &provider-groq2    { api_key: "os.environ/GROQ_API_KEY_2" }
  gemini1:  &provider-gemini1  { api_key: "os.environ/GEMINI_API_KEY" }
  gemini2:  &provider-gemini2  { api_key: "os.environ/GEMINI_API_KEY_2" }
  gemini3:  &provider-gemini3  { api_key: "os.environ/GEMINI_API_KEY_3" }
  azure1:   &provider-azure1   { api_key: "os.environ/AZURE_AI_API_KEY", api_base: "os.environ/AZURE_AI_API_BASE" }
  azure2:   &provider-azure2   { api_key: "os.environ/AZURE_AI_API_KEY_2", api_base: "os.environ/AZURE_AI_API_BASE_2" }
  local:    &provider-local    { api_base: "os.environ/OLLAMA_BASE_URL", api_key: "local" }

model_list:
  # Tier 1: Simple tasks
  - model_name: "tier1"
    litellm_params:
      <<: *provider-groq1
      model: "groq/meta-llama/llama-4-scout-17b-16e-instruct"
      order: 1
    model_info: *model-info-small
  - model_name: "tier1"
    litellm_params:
      <<: *provider-groq2
      model: "groq/meta-llama/llama-4-scout-17b-16e-instruct"
      order: 1
    model_info: *model-info-small
  - model_name: "tier1"
    litellm_params:
      <<: *provider-gemini1
      model: "gemini/gemini-2.5-flash"
      order: 2
    model_info: *model-info-small
  - model_name: "tier1"
    litellm_params:
      <<: *provider-gemini2
      model: "gemini/gemini-2.5-flash"
      order: 2
    model_info: *model-info-small
  - model_name: "tier1"
    litellm_params:
      <<: *provider-gemini3
      model: "gemini/gemini-2.5-flash"
      order: 2
    model_info: *model-info-small
  - model_name: "tier1"
    litellm_params:
      <<: *provider-azure1
      model: "azure_ai/kimi-k2.5"
      order: 3
    model_info: *model-info-small
  - model_name: "tier1"
    litellm_params:
      <<: *provider-azure2
      model: "azure_ai/kimi-k2.5"
      order: 3
    model_info: *model-info-small
  - model_name: "tier1"
    litellm_params:
      <<: *provider-local
      model: "ollama/gemma4:26b"
      order: 0
    model_info: *model-info-small

  # Tier 2: Standard tasks
  - model_name: "tier2"
    litellm_params:
      <<: *provider-groq1
      model: "groq/meta-llama/llama-4-scout-17b-16e-instruct"
      order: 1
    model_info: *model-info-medium
  - model_name: "tier2"
    litellm_params:
      <<: *provider-groq2
      model: "groq/meta-llama/llama-4-scout-17b-16e-instruct"
      order: 1
    model_info: *model-info-medium
  - model_name: "tier2"
    litellm_params:
      <<: *provider-gemini1
