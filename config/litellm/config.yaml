      order: 0
    model_info: *model-info-small

router_settings:
  routing_strategy: "simple-shuffle"
  enable_pre_call_checks: true
  num_retries: 7
  retry_after: 5
  timeout: 120
  cooldown_time: 60
  fallbacks:
    - tier1: ["tier2", "tier3"]
    - tier2: ["tier1", "tier3"]
    - tier3: ["tier2", "tier1"]
    - gpt-4o-mini: ["tier2", "tier3"]
    - gpt-4o: ["tier1", "tier3"]
    - gpt-4.1: ["tier2", "tier1"]
    - gpt-4.1-mini: ["tier2", "tier3"]
    - gpt-4.1-nano: ["tier2", "tier3"]
    - gpt-5-nano: ["tier2", "tier3"]
    - gpt-5-mini: ["tier2", "tier3"]
  model_group_alias:
    "gpt-4o-mini": "tier1"
    "gpt-4o": "tier2"
    "gpt-4.1": "tier3"
    "gpt-4.1-mini": "tier1"
    "gpt-4.1-nano": "tier1"
    "gpt-5-nano": "tier1"
    "gpt-5-mini": "tier1"

general_settings:
  master_key: "os.environ/LITELLM_MASTER_KEY"
  drop_params: true
  set_verbose: false
  json_logs: true
  max_parallel_requests: 100
  global_max_parallel_requests: 1000
  fallback_on_status_codes: [429, 500, 502, 503, 504]

litellm_settings:
  drop_params: true
  set_verbose: false
  cache: false
