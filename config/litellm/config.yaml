  - model_name: "tier2"
    litellm_params:
      <<: *provider-azure2
      model: "azure_ai/gpt-5.2-chat"
      order: 3
    model_info: *model-info-medium
  - model_name: "tier2"
    litellm_params:
      <<: *provider-local
      model: "ollama/gemma4:26b"
      order: 0
    model_info: *model-info-medium

  # Tier 3: Complex tasks
  - model_name: "tier3"
    litellm_params:
      <<: *provider-groq1
      model: "groq/meta-llama/llama-4-scout-17b-16e-instruct"
      order: 1
    model_info: *model-info-medium
  - model_name: "tier3"
    litellm_params:
      <<: *provider-groq2
      model: "groq/meta-llama/llama-4-scout-17b-16e-instruct"
      order: 1
    model_info: *model-info-medium
  - model_name: "tier3"
    litellm_params:
      <<: *provider-gemini1
      model: "gemini/gemini-2.5-flash"
      order: 2
    model_info: *model-info-medium
  - model_name: "tier3"
    litellm_params:
      <<: *provider-gemini2
      model: "gemini/gemini-2.5-flash"
      order: 2
    model_info: *model-info-medium
  - model_name: "tier3"
    litellm_params:
      <<: *provider-gemini3
      model: "gemini/gemini-2.5-flash"
