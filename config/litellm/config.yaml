      order: 0
    model_info: *model-info-medium

  # Model aliases for OpenAI compatibility
  - model_name: "gpt-4o-mini"
    litellm_params:
      <<: *provider-groq1
      model: "groq/meta-llama/llama-4-scout-17b-16e-instruct"
      order: 1
    model_info: *model-info-small
  - model_name: "gpt-4o-mini"
    litellm_params:
      <<: *provider-groq2
      model: "groq/meta-llama/llama-4-scout-17b-16e-instruct"
      order: 1
    model_info: *model-info-small
  - model_name: "gpt-4o-mini"
    litellm_params:
      <<: *provider-gemini1
      model: "gemini/gemini-2.5-flash"
      order: 2
    model_info: *model-info-small
  - model_name: "gpt-4o-mini"
    litellm_params:
      <<: *provider-gemini2
      model: "gemini/gemini-2.5-flash"
      order: 2
    model_info: *model-info-small
  - model_name: "gpt-4o-mini"
    litellm_params:
      <<: *provider-gemini3
