providers:
  groq:
    keys:
      - source: env
        name: GROQ_API_KEY
      - source: env
        name: GROQ_API_KEY_2
    models:
      - name: meta-llama/llama-4-scout-17b-16e-instruct
        context_window: 8192
        max_tokens: 2048
  gemini:
    keys:
      - source: env
        name: GEMINI_API_KEY
      - source: env
        name: GEMINI_API_KEY_2
      - source: env
        name: GEMINI_API_KEY_3
    models:
      - name: gemini-3-flash-preview
        context_window: 32768
        max_tokens: 8192
      - name: gemini-3.1-pro-preview
        context_window: 32768
        max_tokens: 8192
      - name: gemini-2.5-flash
        context_window: 8192
        max_tokens: 2048
      - name: gemini-2.5-pro
        context_window: 8192
        max_tokens: 2048
      - name: gemini-pro-latest
        context_window: 32768
        max_tokens: 8192
      - name: gemini-flash-latest
        context_window: 8192
        max_tokens: 2048
  azure:
    keys:
      - source: env
        name: AZURE_AI_API_KEY
        resourceName: fs-LeanKernel
      - source: env
        name: AZURE_AI_API_KEY_2
        resourceName: alfer-mkokmbre
    models:
      - name: gpt-5.4-1
        context_window: 8192
        max_tokens: 2048
      - name: gpt-5.4-mini-1
        context_window: 32768
        max_tokens: 8192
      - name: gpt-5.4-nano-1
        context_window: 32768
        max_tokens: 8192
  github_copilot:
    keys:
      - source: env
        name: GITHUB_COPILOT_OAUTH_TOKEN
        api_base_env: GITHUB_COPILOT_API_BASE
    models:
      - name: gpt-4.1
        context_window: 32768
        max_tokens: 8192
  openai:
    keys:
      - source: env
        name: OPENAI_API_KEY
  anthropic:
    keys:
      - source: env
        name: ANTHROPIC_API_KEY
  ollama:
    base_url:
      - source: env
        name: OLLAMA_BASE_URL
    models:
      - name: gemma4:26b
        context_window: 32768
        max_tokens: 8192
  custom:
    base_url:
      - source: env
        name: CUSTOM_API_BASE
    keys:
      - source: env
        name: CUSTOM_API_KEY
    models:
      - name: custom-model
        context_window: 32768
        max_tokens: 8192

routes:
  small:
    - provider: groq
      model: scout
      keys: [groq1, groq2]
      order: 1
    - provider: gemini
      model: flash
      keys: [gemini1, gemini2, gemini3]
      order: 2
    - provider: azure
      model: kimi_k2_5
      keys: [azure1, azure2]
      order: 3
    - provider: github_copilot
      model: gpt-4.1
      keys: [github_copilot1]
      order: 4
    - provider: local
      model: gemma4_26b
      keys: [local]
      order: 0
  medium:
    - provider: groq
      model: scout
      keys: [groq1, groq2]
      order: 1
    - provider: gemini
      model: flash
      keys: [gemini1, gemini2, gemini3]
      order: 2
    - provider: azure
      model: gpt-5.4-1
      keys: [azure1, azure2]
      order: 3
    - provider: github_copilot
      model: gpt-4.1
      keys: [github_copilot1]
      order: 4
    - provider: local
      model: gemma4_26b
      keys: [local]
      order: 0
  large:
    - provider: groq
      model: scout
      keys: [groq1, groq2]
      order: 1
    - provider: gemini
      model: flash
      keys: [gemini1, gemini2, gemini3]
      order: 2
    - provider: azure
      model: gpt-5.4-1
      keys: [azure1, azure2]
      order: 3
    - provider: github_copilot
      model: gpt-4.1
      keys: [github_copilot1]
      order: 4
    - provider: local
      model: gemma4_26b
      keys: [local]
      order: 0
