name: Sonar Scan

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'scripts/quality/**'
      - 'docker-compose.sonar.yml'
      - '.github/workflows/sonar-scan.yml'
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - 'src/**'
      - 'scripts/quality/**'
      - 'docker-compose.sonar.yml'
      - '.github/workflows/sonar-scan.yml'

permissions:
  contents: read

jobs:
  scan:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft != true

    env:
      SONAR_HOST_URL: http://localhost:9000
      SONAR_PROJECT_KEY: LeanKernel

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run SonarQube scan
        run: scripts/quality/sonarqube-scan.sh

      - name: Upload Sonar results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonar-scan-results
          path: |
            coverage-results/sonar
            docs/sonar-prds
          if-no-files-found: ignore
          retention-days: 14
