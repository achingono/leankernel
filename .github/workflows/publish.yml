name: Build and Publish Images

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-images:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - image: engine
            dockerfile: Dockerfile
            context: .
            platforms: linux/amd64,linux/arm64
          - image: gbrain
            dockerfile: config/gbrain/Dockerfile
            context: .
            platforms: linux/amd64,linux/arm64
          - image: browser-service
            dockerfile: config/browser-service/Dockerfile
            context: .
            platforms: linux/amd64,linux/arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af
          df -h

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{branch}}-,enable=${{ github.ref_type == 'branch' }}
            type=sha,prefix=sha-,enable=${{ github.ref_type == 'tag' }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: ${{ matrix.platforms }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-images
    if: ${{ github.ref_type == 'tag' }}
    permissions:
      contents: write

    steps:
      - name: Get previous release tag
        id: prev_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases"
          # Releases are returned newest-first; pick the first one that isn't the current tag.
          prev_tag=$(curl -sS -H "Authorization: Bearer ${GITHUB_TOKEN}" -H "Accept: application/vnd.github+json" "$api" \
            | jq -r --arg cur "${GITHUB_REF_NAME}" '[.[] | select(.tag_name != $cur)][0].tag_name // empty')
          echo "prev_tag=${prev_tag}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: release_notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cur_tag="${GITHUB_REF_NAME}"
          prev_tag="${{ steps.prev_release.outputs.prev_tag }}"

          if [ -z "$prev_tag" ]; then
            commits=$(curl -sS --fail -H "Authorization: Bearer ${GITHUB_TOKEN}" -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/commits?sha=${cur_tag}&per_page=50" \
              | jq -r '.[]? | "- \(.commit.message | split("\n")[0]) (\(.sha[0:7]))"')
          else
            compare="https://api.github.com/repos/${GITHUB_REPOSITORY}/compare/${prev_tag}...${cur_tag}"
            commits=$(curl -sS --fail -H "Authorization: Bearer ${GITHUB_TOKEN}" -H "Accept: application/vnd.github+json" "$compare" \
              | jq -r '.commits[]? | "- \(.commit.message | split("\n")[0]) (\(.sha[0:7]))"')
          fi

          if [ -z "$commits" ]; then
            commits="- No commits found for this release."
          fi

          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$commits" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Generate image tags
        id: image_tags
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          major="${version%%.*}"
          minor="${version%.*}"
          short_sha="${GITHUB_SHA:0:7}"
          registry_repo="ghcr.io/${GITHUB_REPOSITORY}"

          {
            echo "tags<<EOF"
            for image in engine gbrain browser-service; do
              echo "${registry_repo}/${image}:${version}"
              echo "${registry_repo}/${image}:${minor}"
              echo "${registry_repo}/${image}:${major}"
              echo "${registry_repo}/${image}:sha-${short_sha}"
            done
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release (with image tags)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            Release notes since last release:
            ${{ steps.release_notes.outputs.notes }}

            Docker image tags:
            ${{ steps.image_tags.outputs.tags }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
