<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1160" viewBox="0 0 1920 1160" role="img" aria-labelledby="title desc">
  <title id="title">LeanKernel Engine Component Flow</title>
  <desc id="desc">Component-level runtime flow with orthogonal arrows and explicit phase grouping for readability.</desc>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#334155"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#0f766e"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1920" height="1160" fill="#f8fafc"/>
  <text x="56" y="58" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#0f172a">
    LeanKernel Engine - Component Interaction (Level 2)
  </text>
  <text x="56" y="90" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#475569">
    Orthogonal flow map: synchronous request path, context branch, model/tool loop, persistence, and asynchronous learning.
  </text>

  <!-- phase containers -->
  <g filter="url(#shadow)">
    <rect x="44" y="130" width="1832" height="308" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="44" y="462" width="1832" height="292" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="44" y="778" width="1832" height="338" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
  </g>
  <text x="70" y="162" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#1e293b">Phase A - Inbound request and context build</text>
  <text x="70" y="494" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#1e293b">Phase B - Model reasoning and response synthesis</text>
  <text x="70" y="810" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#1e293b">Phase C - Persistence, delivery, and post-turn learning</text>

  <!-- top row nodes -->
  <g filter="url(#shadow)">
    <rect x="78" y="210" width="238" height="102" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
    <rect x="360" y="210" width="238" height="102" rx="12" fill="#eff6ff" stroke="#0ea5e9" stroke-width="2"/>
    <rect x="642" y="210" width="238" height="102" rx="12" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/>
    <rect x="924" y="210" width="238" height="102" rx="12" fill="#ecfeff" stroke="#14b8a6" stroke-width="2"/>
    <rect x="1206" y="210" width="238" height="102" rx="12" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
    <rect x="1488" y="210" width="344" height="102" rx="12" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  </g>

  <text x="98" y="246" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" fill="#1e293b">1. Channel input</text>
  <text x="98" y="270" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#475569">UI/API/Signal ingress</text>

  <text x="380" y="246" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" fill="#1e293b">2. Commander</text>
  <text x="380" y="270" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#475569">Normalize LeanKernelMessage</text>

  <text x="662" y="246" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" fill="#1e293b">3. Thinker</text>
  <text x="662" y="270" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#475569">Runtime turn orchestration</text>

  <text x="944" y="246" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" fill="#1e293b">4. Archivist</text>
  <text x="944" y="270" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#475569">Context gate + ranking</text>

  <text x="1226" y="246" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" fill="#1e293b">5. Strategy</text>
  <text x="1226" y="270" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#475569">Model route + prompt invoke</text>

  <text x="1508" y="246" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" fill="#1e293b">6. Session append</text>
  <text x="1508" y="270" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#475569">Persist turn and diagnostics</text>

  <!-- context branch -->
  <g filter="url(#shadow)">
    <rect x="870" y="330" width="184" height="78" rx="10" fill="#ecfeff" stroke="#14b8a6" stroke-width="2"/>
    <rect x="1080" y="330" width="184" height="78" rx="10" fill="#ecfeff" stroke="#14b8a6" stroke-width="2"/>
  </g>
  <text x="888" y="360" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#1e293b">4a. Wiki store</text>
  <text x="888" y="381" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#475569">5W1H facts</text>
  <text x="1098" y="360" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#1e293b">4b. Qdrant</text>
  <text x="1098" y="381" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#475569">vector candidates</text>

  <!-- middle row -->
  <g filter="url(#shadow)">
    <rect x="256" y="542" width="340" height="118" rx="12" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/>
    <rect x="640" y="542" width="340" height="118" rx="12" fill="#faf5ff" stroke="#a855f7" stroke-width="2"/>
    <rect x="1024" y="542" width="340" height="118" rx="12" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
    <rect x="1408" y="542" width="424" height="118" rx="12" fill="#eff6ff" stroke="#0284c7" stroke-width="2"/>
  </g>

  <text x="276" y="578" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" fill="#1e293b">7. Prompt assembly</text>
  <text x="276" y="602" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#475569">context budget + system/history/tools</text>

  <text x="660" y="578" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" fill="#1e293b">8. LiteLLM call</text>
  <text x="660" y="602" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#475569">provider abstraction and response</text>

  <text x="1044" y="578" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" fill="#1e293b">9. Tool loop</text>
  <text x="1044" y="602" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#475569">plugin execution and merge</text>

  <text x="1428" y="578" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" fill="#1e293b">10. Final assistant text</text>
  <text x="1428" y="602" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#475569">returned to Commander for outbound path</text>

  <!-- bottom row -->
  <g filter="url(#shadow)">
    <rect x="78" y="858" width="322" height="128" rx="12" fill="#eff6ff" stroke="#0ea5e9" stroke-width="2"/>
    <rect x="432" y="858" width="322" height="128" rx="12" fill="#eff6ff" stroke="#0284c7" stroke-width="2"/>
    <rect x="786" y="858" width="322" height="128" rx="12" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
    <rect x="1140" y="858" width="322" height="128" rx="12" fill="#ecfeff" stroke="#14b8a6" stroke-width="2"/>
    <rect x="1494" y="858" width="338" height="128" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  </g>

  <text x="98" y="896" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" fill="#1e293b">11. Outbound queue</text>
  <text x="98" y="920" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#475569">SQLite-backed message dispatch</text>

  <text x="452" y="896" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" fill="#1e293b">12. Channel adapter</text>
  <text x="452" y="920" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#475569">delivery + retry persistence</text>

  <text x="806" y="896" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" fill="#1e293b">13. TurnEvent queue</text>
  <text x="806" y="920" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#475569">durable post-turn learning events</text>

  <text x="1160" y="896" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" fill="#1e293b">14. Learning steps</text>
  <text x="1160" y="920" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#475569">fact extraction + identity updates</text>

  <text x="1514" y="896" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" fill="#1e293b">15. Memory refresh</text>
  <text x="1514" y="920" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#475569">wiki/session/telemetry updates</text>

  <!-- clean orthogonal arrows -->
  <line x1="316" y1="261" x2="360" y2="261" stroke="#334155" stroke-width="2.6" marker-end="url(#arrow)"/>
  <line x1="598" y1="261" x2="642" y2="261" stroke="#334155" stroke-width="2.6" marker-end="url(#arrow)"/>
  <line x1="880" y1="261" x2="924" y2="261" stroke="#334155" stroke-width="2.6" marker-end="url(#arrow)"/>
  <line x1="1162" y1="261" x2="1206" y2="261" stroke="#334155" stroke-width="2.6" marker-end="url(#arrow)"/>
  <line x1="1444" y1="261" x2="1488" y2="261" stroke="#334155" stroke-width="2.6" marker-end="url(#arrow)"/>

  <!-- context branch -->
  <path d="M962 312 V330" fill="none" stroke="#14b8a6" stroke-width="2.4" marker-end="url(#arrow)"/>
  <path d="M1162 312 V320 H1172 V330" fill="none" stroke="#14b8a6" stroke-width="2.4" marker-end="url(#arrow)"/>
  <path d="M962 408 V440 H406 V542" fill="none" stroke="#14b8a6" stroke-width="2.4" marker-end="url(#arrow)"/>
  <path d="M1172 408 V440 H446 V542" fill="none" stroke="#14b8a6" stroke-width="2.4" marker-end="url(#arrow)"/>

  <!-- model and tool loop -->
  <line x1="596" y1="601" x2="640" y2="601" stroke="#334155" stroke-width="2.6" marker-end="url(#arrow)"/>
  <line x1="980" y1="601" x2="1024" y2="601" stroke="#334155" stroke-width="2.6" marker-end="url(#arrow)"/>
  <line x1="1364" y1="601" x2="1408" y2="601" stroke="#334155" stroke-width="2.6" marker-end="url(#arrow)"/>
  <path d="M1194 660 V704 H810 V660" fill="none" stroke="#0f766e" stroke-width="2.4" marker-end="url(#arrowGreen)"/>
  <text x="868" y="699" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#0f766e">tool results merged back to model context</text>

  <!-- response to outbound -->
  <path d="M1620 660 V765 H1890 V1130 H239 V986" fill="none" stroke="#0f766e" stroke-width="2.6" marker-end="url(#arrowGreen)"/>
  <line x1="400" y1="922" x2="432" y2="922" stroke="#0f766e" stroke-width="2.6" marker-end="url(#arrowGreen)"/>

  <!-- async learning -->
  <path d="M1640 660 V775 H1900 V1140 H947 V986" fill="none" stroke="#0284c7" stroke-width="2.4" marker-end="url(#arrow)"/>
  <line x1="1108" y1="922" x2="1140" y2="922" stroke="#0284c7" stroke-width="2.4" marker-end="url(#arrow)"/>
  <line x1="1462" y1="922" x2="1494" y2="922" stroke="#0284c7" stroke-width="2.4" marker-end="url(#arrow)"/>

  <!-- legend -->
  <rect x="78" y="1014" width="1754" height="82" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
  <line x1="104" y1="1042" x2="168" y2="1042" stroke="#334155" stroke-width="2.6" marker-end="url(#arrow)"/>
  <text x="188" y="1048" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#334155">Synchronous path</text>
  <line x1="104" y1="1070" x2="168" y2="1070" stroke="#0f766e" stroke-width="2.6" marker-end="url(#arrowGreen)"/>
  <text x="188" y="1076" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#334155">Response flow</text>
  <line x1="426" y1="1042" x2="490" y2="1042" stroke="#14b8a6" stroke-width="2.4" marker-end="url(#arrow)"/>
  <text x="510" y="1048" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#334155">Context retrieval branch</text>
  <line x1="426" y1="1070" x2="490" y2="1070" stroke="#0284c7" stroke-width="2.4" marker-end="url(#arrow)"/>
  <text x="510" y="1076" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#334155">Async self-improvement path</text>
  <text x="850" y="1048" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#475569">Arrow routes intentionally orthogonal to reduce visual ambiguity.</text>
</svg>
