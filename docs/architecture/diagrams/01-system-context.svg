  <text x="1500" y="436" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#475569">semantic retrieval with source scoping</text>

  <rect x="1480" y="498" width="372" height="122" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="1500" y="531" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#1e293b">Indexer (Python)</text>
  <text x="1500" y="555" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#475569">watches wiki/docs and manages embeddings</text>
  <text x="1500" y="578" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#475569">writes vectors and metadata tags</text>

