<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1120" viewBox="0 0 1920 1120" role="img" aria-labelledby="title desc">
  <title id="title">LeanKernel System Context Diagram</title>
  <desc id="desc">High-level architecture with external actors, LeanKernel engine components, sidecars, and clean directional flows.</desc>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1920" height="1120" fill="#f8fafc"/>
  <text x="56" y="58" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#0f172a">
    LeanKernel Architecture - System Context (Level 1)
  </text>
  <text x="56" y="90" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#475569">
    Clean directional flow for solution architects: request ingress, orchestration, memory/model services, and response delivery.
  </text>

  <!-- Left: external -->
  <g filter="url(#shadow)">
    <rect x="44" y="132" width="340" height="930" rx="16" fill="#ffffff" stroke="#93c5fd" stroke-width="2"/>
  </g>
  <text x="68" y="170" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#1e293b">External Actors</text>

  <g filter="url(#shadow)">
    <rect x="68" y="214" width="292" height="138" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  </g>
  <text x="90" y="248" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#1e293b">End User</text>
