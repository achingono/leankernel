  </g>
  <text x="478" y="430" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21" font-weight="700" fill="#1e293b">Plugins + Skills</text>
  <text x="478" y="455" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#475569">search_knowledge / search_wiki / search_documents</text>
