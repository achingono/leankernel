<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="2048" height="1280" viewBox="0 0 2048 1280" role="img" aria-labelledby="title desc">
  <title id="title">LeanKernel Request and Response Sequence</title>
  <desc id="desc">End-to-end sequence diagram for request handling, context retrieval, model/tool execution, response delivery, and async learning.</desc>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#334155"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#0f766e"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.15"/>
    </filter>
    <style>
      .title { font-family: Inter, Segoe UI, Arial, sans-serif; fill: #0f172a; }
      .txt { font-family: Inter, Segoe UI, Arial, sans-serif; fill: #334155; }
      .small { font-family: Inter, Segoe UI, Arial, sans-serif; fill: #475569; font-size: 13px; }
    </style>
  </defs>

  <rect width="2048" height="1280" fill="#f8fafc"/>
  <text x="56" y="58" class="title" font-size="34" font-weight="700">LeanKernel Request / Response Flow (Level 3 Sequence)</text>
  <text x="56" y="90" class="txt" font-size="18">Detailed turn execution with sidecar interactions, storage updates, queueing, and asynchronous self-improvement.</text>

  <!-- Lifeline headers -->
  <g filter="url(#shadow)">
    <rect x="52" y="130" width="1944" height="1120" rx="18" fill="#eef2ff" stroke="#c7d2fe" stroke-width="2"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="90" y="162" width="170" height="74" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
    <text x="112" y="192" class="title" font-size="17" font-weight="700">User/Channel</text>
    <text x="112" y="214" class="small">UI, API, Signal</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="308" y="162" width="170" height="74" rx="10" fill="#ffffff" stroke="#0ea5e9" stroke-width="2"/>
    <text x="334" y="192" class="title" font-size="17" font-weight="700">Commander</text>
    <text x="334" y="214" class="small">Normalization</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="556" y="162" width="110" height="74" rx="10" fill="#ffffff" stroke="#0284c7" stroke-width="2"/>
    <text x="570" y="192" class="title" font-size="16" font-weight="700">Stores</text>
    <text x="570" y="214" class="small">Session + queue</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="739" y="162" width="180" height="74" rx="10" fill="#ffffff" stroke="#8b5cf6" stroke-width="2"/>
    <text x="761" y="192" class="title" font-size="17" font-weight="700">Thinker</text>
    <text x="761" y="214" class="small">Turn orchestrator</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="962" y="162" width="170" height="74" rx="10" fill="#ffffff" stroke="#a855f7" stroke-width="2"/>
    <text x="984" y="192" class="title" font-size="17" font-weight="700">LiteLLM</text>
    <text x="984" y="214" class="small">Model gateway</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1180" y="162" width="170" height="74" rx="10" fill="#ffffff" stroke="#f97316" stroke-width="2"/>
    <text x="1207" y="192" class="title" font-size="17" font-weight="700">Plugins</text>
    <text x="1207" y="214" class="small">Tool execution</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1388" y="162" width="190" height="74" rx="10" fill="#ffffff" stroke="#14b8a6" stroke-width="2"/>
    <text x="1408" y="192" class="title" font-size="17" font-weight="700">Archivist</text>
    <text x="1408" y="214" class="small">Context gatekeeper</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1616" y="162" width="170" height="74" rx="10" fill="#ffffff" stroke="#6366f1" stroke-width="2"/>
    <text x="1644" y="192" class="title" font-size="17" font-weight="700">Wiki Store</text>
    <text x="1644" y="214" class="small">5W1H memory</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1834" y="162" width="170" height="74" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
    <text x="1868" y="192" class="title" font-size="17" font-weight="700">Qdrant</text>
    <text x="1868" y="214" class="small">Vectors</text>
  </g>

  <!-- Lifelines -->
  <line x1="175" y1="236" x2="175" y2="1218" stroke="#94a3b8" stroke-dasharray="6 6"/>
  <line x1="393" y1="236" x2="393" y2="1218" stroke="#94a3b8" stroke-dasharray="6 6"/>
  <line x1="611" y1="236" x2="611" y2="1218" stroke="#94a3b8" stroke-dasharray="6 6"/>
  <line x1="829" y1="236" x2="829" y2="1218" stroke="#94a3b8" stroke-dasharray="6 6"/>
  <line x1="1047" y1="236" x2="1047" y2="1218" stroke="#94a3b8" stroke-dasharray="6 6"/>
  <line x1="1265" y1="236" x2="1265" y2="1218" stroke="#94a3b8" stroke-dasharray="6 6"/>
  <line x1="1483" y1="236" x2="1483" y2="1218" stroke="#94a3b8" stroke-dasharray="6 6"/>
  <line x1="1701" y1="236" x2="1701" y2="1218" stroke="#94a3b8" stroke-dasharray="6 6"/>
  <line x1="1919" y1="236" x2="1919" y2="1218" stroke="#94a3b8" stroke-dasharray="6 6"/>

  <!-- Phase bands -->
  <rect x="72" y="256" width="1888" height="292" rx="8" fill="#ffffff" stroke="#dbeafe"/>
  <text x="90" y="286" class="title" font-size="18" font-weight="700">Phase A - Request ingestion and context construction</text>

  <rect x="72" y="566" width="1888" height="292" rx="8" fill="#ffffff" stroke="#dcfce7"/>
  <text x="90" y="596" class="title" font-size="18" font-weight="700">Phase B - Model reasoning, tool calls, and synchronous response</text>

  <rect x="72" y="876" width="1888" height="322" rx="8" fill="#ffffff" stroke="#dbeafe"/>
  <text x="90" y="906" class="title" font-size="18" font-weight="700">Phase C - Persistence, outbound delivery, and asynchronous learning</text>

  <!-- Sequence arrows (A) -->
  <line x1="175" y1="324" x2="393" y2="324" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="188" y="316" class="small">1) Raw message + metadata</text>

  <line x1="393" y1="358" x2="829" y2="358" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="410" y="350" class="small">2) LeanKernelMessage (normalized)</text>

  <line x1="829" y1="392" x2="1483" y2="392" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="849" y="384" class="small">3) Build context budget request</text>

  <line x1="1483" y1="426" x2="1701" y2="426" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="1503" y="418" class="small">4) Query wiki facts by 5W1H intent</text>

  <line x1="1483" y1="460" x2="1919" y2="460" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="1503" y="452" class="small">5) Vector search (scoped tags/source)</text>

  <line x1="1919" y1="494" x2="1483" y2="494" stroke="#0f766e" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <text x="1503" y="486" class="small">6) Ranked candidates</text>

  <line x1="1701" y1="528" x2="1483" y2="528" stroke="#0f766e" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <text x="1503" y="520" class="small">7) Wiki facts + citations</text>

  <!-- Sequence arrows (B) -->
  <line x1="1483" y1="634" x2="829" y2="634" stroke="#0f766e" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <text x="849" y="626" class="small">8) ContextBudget + prompt parts</text>

  <line x1="829" y1="668" x2="1047" y2="668" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="849" y="660" class="small">9) Prompt + tool schemas (via strategy)</text>

  <line x1="1047" y1="702" x2="1265" y2="702" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="1067" y="694" class="small">10) Tool invocation(s)</text>

  <line x1="1265" y1="736" x2="829" y2="736" stroke="#0f766e" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <text x="849" y="728" class="small">11) Tool results merged into turn</text>

  <line x1="1047" y1="770" x2="829" y2="770" stroke="#0f766e" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <text x="849" y="762" class="small">12) Model completion</text>

  <line x1="829" y1="804" x2="393" y2="804" stroke="#0f766e" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <line x1="393" y1="838" x2="175" y2="838" stroke="#0f766e" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <text x="195" y="830" class="small">13) Response payload enqueued for channel</text>

  <!-- Sequence arrows (C) -->
  <line x1="829" y1="948" x2="611" y2="948" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="631" y="940" class="small">14) Persist assistant turn + diagnostics</text>

  <line x1="829" y1="982" x2="611" y2="982" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="631" y="974" class="small">15) Persist TurnEvent to durable queue</text>

  <line x1="611" y1="1020" x2="1265" y2="1020" stroke="#0284c7" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="631" y="1012" class="small">16) Worker drains queue</text>

  <line x1="1265" y1="1054" x2="1701" y2="1054" stroke="#0284c7" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="1285" y="1046" class="small">17) New facts extracted + upserted</text>

  <line x1="1265" y1="1088" x2="611" y2="1088" stroke="#0284c7" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="631" y="1080" class="small">18) Queue ack / retries / telemetry</text>

  <!-- Activation bars -->
  <rect x="823" y="346" width="12" height="694" fill="#ddd6fe" stroke="#8b5cf6"/>
  <rect x="1477" y="380" width="12" height="210" fill="#ccfbf1" stroke="#14b8a6"/>
  <rect x="1041" y="650" width="12" height="140" fill="#f3e8ff" stroke="#a855f7"/>
  <rect x="1259" y="692" width="12" height="402" fill="#ffedd5" stroke="#f97316"/>
  <rect x="605" y="932" width="12" height="180" fill="#dbeafe" stroke="#0284c7"/>

  <!-- Notes -->
  <rect x="86" y="1130" width="1874" height="94" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="110" y="1158" class="title" font-size="17" font-weight="700">Architectural Notes</text>
  <text x="110" y="1181" class="small">- Response is returned before heavy learning steps complete, keeping user latency low.</text>
  <text x="110" y="1201" class="small">- Context gatekeeper starts from empty context and admits only relevant memory within token budgets.</text>
  <text x="1000" y="1181" class="small">- Knowledge path combines structured wiki facts + vector retrieval (Qdrant) with source scoping.</text>
  <text x="1000" y="1201" class="small">- Durable queue/persistence allows restart-safe post-turn improvements and outbound delivery retries.</text>
</svg>
