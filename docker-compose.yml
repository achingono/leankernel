# docker-compose.yml — LeanKernel AI Agent
# Services: Engine (.NET 10), LiteLLM (model proxy), Qdrant (vector DB),
#           Unstructured (document parser), Indexer (knowledge pipeline)

services:
  # ── LeanKernel Engine (Core Application) ───────────────────────────
  engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: LeanKernel-engine
    environment:
      - DOTNET_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5080
      - LEANKERNEL__LITELLM__BASEURL=http://litellm:4000
      - LEANKERNEL__UNSTRUCTURED__BASEURL=http://unstructured:8000
      - LEANKERNEL__LITELLM__APIKEY=${LITELLM_MASTER_KEY:-sk-LeanKernel-local}
      - LEANKERNEL__QDRANT__HOST=qdrant
      - LEANKERNEL__QDRANT__PORT=6334
      - LEANKERNEL__QDRANT__EMBEDDINGDIMENSION=${EMBEDDING_DIMENSION:-3072}
      - LEANKERNEL__SIGNAL__ENABLED=${LEANKERNEL_SIGNAL_ENABLED:-true}
      - LEANKERNEL__SIGNAL__CLIPATH=${LEANKERNEL_SIGNAL_CLI_PATH:-/usr/bin/signal-cli}
      - LEANKERNEL__SIGNAL__ACCOUNT=${SIGNAL_PHONE_NUMBER:-}
      - LEANKERNEL__SIGNAL__ALLOWEDSENDERS__0=${SIGNAL_ALLOWED_SENDER_0:-}
      - LEANKERNEL__SIGNAL__DAEMONBASEURL=http://signal:8080
      - MS_TODO_CLIENT_ID=${MS_TODO_CLIENT_ID:-}
      - LEANKERNEL__WIKI__BASEPATH=/app/data/wiki
      - LEANKERNEL__AGENTS__BASEPATH=/app/data/agents
      - LEANKERNEL__KNOWLEDGE__ENABLED=true
      - LEANKERNEL__KNOWLEDGE__COLLECTIONNAME=LEANKERNEL_knowledge
      - LEANKERNEL__KNOWLEDGE__EMBEDDINGDIMENSION=${EMBEDDING_DIMENSION:-3072}
      - LEANKERNEL__ROUTING__ENABLED=true
      - LEANKERNEL__OLLAMA__BASEURL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - LEANKERNEL__OLLAMA__MODEL=${OLLAMA_EXTRACT_MODEL:-neural-chat}
      - LEANKERNEL__OLLAMA__TEMPERATURE=${OLLAMA_EXTRACT_TEMPERATURE:-0.1}
      - LEANKERNEL__OLLAMA__TIMEOUTSECONDS=${OLLAMA_EXTRACT_TIMEOUT:-60}
      - TZ=${TZ:-America/Toronto}
    volumes:
      - ./data:/app/data
      - ./config/litellm:/app/config/litellm
      - ./data/.signal-cli:/home/LeanKernel/.local/share/signal-cli
      - ./data/.ms-todo-cli:/home/LeanKernel/.ms-todo-cli
      - ./data/.simplefin-cli:/home/LeanKernel/.simplefin-cli
    depends_on:
      signal:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      litellm:
        condition: service_healthy
    ports:
      - "${LEANKERNEL_PORT:-5080}:5080"            # Web UI + API + OpenAI-compatible
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── LiteLLM Proxy (Model Router) ─────────────────────────────
  litellm:
    build:
      context: config/litellm
      dockerfile: Dockerfile
    container_name: LeanKernel-litellm
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-LeanKernel-local}
      - LITELLM_SALT_KEY=${LITELLM_SALT_KEY:-LeanKernel-salt-change-me}
      - LITELLM_NUM_WORKERS=${LITELLM_NUM_WORKERS:-2}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_API_KEY_2=${GROQ_API_KEY_2:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_API_KEY_2=${GEMINI_API_KEY_2:-}
      - GEMINI_API_KEY_3=${GEMINI_API_KEY_3:-}
      - AZURE_AI_API_KEY=${AZURE_AI_API_KEY:-}
      - AZURE_AI_API_BASE=${AZURE_AI_API_BASE:-}
      - AZURE_AI_API_KEY_2=${AZURE_AI_API_KEY_2:-}
      - AZURE_AI_API_BASE_2=${AZURE_AI_API_BASE_2:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - GITHUB_COPILOT_OAUTH_TOKEN=${GITHUB_COPILOT_OAUTH_TOKEN:-}
      - GITHUB_COPILOT_API_BASE=${GITHUB_COPILOT_API_BASE:-}
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "python3", "-c", "import sys,urllib.request; sys.exit(0 if urllib.request.urlopen('http://localhost:4000/health/liveliness').getcode() == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Qdrant (Vector Store) ─────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: LeanKernel-qdrant
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "perl", "-e", "use IO::Socket::INET; exit(IO::Socket::INET->new(PEERADDR=>\"127.0.0.1:6333\") ? 0 : 1)"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Unstructured (Document Parser) ───────────────────────────
  unstructured:
    image: quay.io/unstructured-io/unstructured-api:latest
    container_name: LeanKernel-unstructured
    ports:
      - "${UNSTRUCTURED_PORT:-8000}:8000"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── LeanKernel Indexer (Knowledge Pipeline Sidecar) ────────────────
  indexer:
    build:
      context: ./config/indexer
      dockerfile: Dockerfile
    container_name: LeanKernel-indexer
    environment:
      - UNSTRUCTURED_API_URL=http://unstructured:8000
      - LITELLM_URL=http://litellm:4000
      - LITELLM_API_KEY=${LITELLM_MASTER_KEY:-sk-LeanKernel-local}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6334
      - COLLECTION_NAME=LEANKERNEL_knowledge
      - WIKI_PATH=/app/data/wiki
      - DOCUMENTS_PATHS=/app/data/documents,/app/data/attachments,/app/data/agents/main/documents
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-embedding-small}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-3072}
      - RESCAN_INTERVAL_SECONDS=${INDEXER_RESCAN_INTERVAL:-300}
      - WIKI_DEBOUNCE_SECONDS=5
      - STATE_DB_PATH=/app/data/indexer-state/indexer-state.db
      - TAG_RULES_JSON=${TAG_RULES_JSON:-[{"pathPattern":"wiki/**","tags":["wiki"]},{"pathPattern":"agents/main/documents/technical/**","tags":["technical"]},{"pathPattern":"agents/main/documents/books/**","tags":["books","general"]}]}
      - TZ=${TZ:-America/Toronto}
    volumes:
      - ./data/wiki:/app/data/wiki
      - ./data/documents:/app/data/documents
      - ./data/agents:/app/data/agents
      - ./data/.signal-cli/attachments:/app/data/attachments
      - indexer-state:/app/data/indexer-state
    depends_on:
      qdrant:
        condition: service_healthy
      litellm:
        condition: service_healthy
      unstructured:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ── Signal Daemon (signal-cli HTTP sidecar) ──────────────────
  signal:
    build:
      context: ./config/signal
      dockerfile: Dockerfile
    container_name: LeanKernel-signal
    environment:
      - SIGNAL_ACCOUNT=${SIGNAL_PHONE_NUMBER:-}
      - SIGNAL_CLI_PATH=/usr/bin/signal-cli
      - SIGNAL_DATA_DIR=/home/LeanKernel/.local/share/signal-cli
      - PORT=8080
      - TZ=${TZ:-America/Toronto}
    volumes:
      - ./data/.signal-cli:/home/LeanKernel/.local/share/signal-cli
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

volumes:
  qdrant-data:
    driver: local
  indexer-state:
    driver: local
