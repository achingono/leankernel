# docker-compose.yml — LeanKernel AI Agent (Rearchitected)
# Services: Engine (.NET 10), LiteLLM (model proxy), Postgres (engine persistence + pgvector), GBrain (wiki/memory)
# Health checks: engine /api/health, database pg_isready, litellm /health, gbrain /health

services:
  # ── Postgres Database (Source of Truth) ────────────────────────
  database:
    image: pgvector/pgvector:pg16
    container_name: leankernel-database
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-leankernel}
      - POSTGRES_USER=${POSTGRES_USER:-leankernel}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-leankernel-dev-password}
      - TZ=${TZ:-America/Toronto}
    volumes:
      - database-data:/var/lib/postgresql/data
      - ./scripts/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-leankernel} -d ${POSTGRES_DB:-leankernel}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── LiteLLM (Model Proxy) ─────────────────────────────────────
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: leankernel-litellm
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-leankernel-local}
      - POSTGRES_HOST=database
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-leankernel}
      - POSTGRES_USER=${POSTGRES_USER:-leankernel}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-leankernel-dev-password}
      - LITELLM_DB_SCHEMA=${LITELLM_DB_SCHEMA:-litellm}
      - PYTHONPATH=/app/config
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_API_KEY_2=${GROQ_API_KEY_2:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_API_KEY_2=${GEMINI_API_KEY_2:-}
      - GEMINI_API_KEY_3=${GEMINI_API_KEY_3:-}
      - AZURE_AI_API_KEY=${AZURE_AI_API_KEY:-}
      - AZURE_AI_API_BASE=${AZURE_AI_API_BASE:-}
      - AZURE_AI_API_KEY_2=${AZURE_AI_API_KEY_2:-}
      - AZURE_AI_API_BASE_2=${AZURE_AI_API_BASE_2:-}
      - GITHUB_COPILOT_OAUTH_TOKEN=${GITHUB_COPILOT_OAUTH_TOKEN:-}
      - GITHUB_COPILOT_API_BASE=${GITHUB_COPILOT_API_BASE:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-}
      - NVIDIA_API_BASE=${NVIDIA_API_BASE:-}
      - TZ=${TZ:-America/Toronto}
    volumes:
      - ./config/litellm:/app/config:ro
      - ./config/litellm/leankernel_litellm_callbacks.py:/app/leankernel_litellm_callbacks.py:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    entrypoint: ["sh", "-c"]
    command: ["set -eu; ENCODED_POSTGRES_PASSWORD=$$(python3 -c \"import os, urllib.parse; print(urllib.parse.quote(os.environ['POSTGRES_PASSWORD']))\"); export DATABASE_URL=postgresql://$${POSTGRES_USER}:$${ENCODED_POSTGRES_PASSWORD}@$${POSTGRES_HOST}:$${POSTGRES_PORT}/$${POSTGRES_DB}?schema=$${LITELLM_DB_SCHEMA}; python3 /app/config/render_litellm_config.py /app/config/config.yaml /app/litellm_config.generated.yaml && exec litellm --config /app/litellm_config.generated.yaml --port 4000"]
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import sys,urllib.request; sys.exit(0 if urllib.request.urlopen('http://localhost:4000/health/liveliness', timeout=5).getcode() == 200 else 1)"]
      interval: 15s
      timeout: 10s
      start_period: 120s
      retries: 5

  # ── GBrain (Wiki/Memory MCP Server) ───────────────────────────
  gbrain:
    build:
      context: .
      dockerfile: config/gbrain/Dockerfile
    container_name: leankernel-gbrain
    working_dir: /app/data/wiki
    environment:
      - POSTGRES_HOST=database
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-leankernel}
      - POSTGRES_USER=${POSTGRES_USER:-leankernel}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-leankernel-dev-password}
      - GBRAIN_DB_URL=${GBRAIN_DB_URL:-}
      - GBRAIN_EMBEDDING_MODEL=${GBRAIN_EMBEDDING_MODEL:-openai:embedding}
      - GBRAIN_EMBEDDING_DIMENSIONS=${GBRAIN_EMBEDDING_DIMENSIONS:-3072}
      - LITELLM_BASE_URL=${LITELLM_BASE_URL:-http://litellm:4000}
      - LITELLM_API_KEY=${LITELLM_MASTER_KEY:-sk-leankernel-local}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - TZ=${TZ:-America/Toronto}
    volumes:
      - ./data/wiki:/app/data/wiki
      - gbrain-data:/app/data/gbrain
    ports:
      - "${GBRAIN_PORT:-8789}:8789"
    depends_on:
      database:
        condition: service_healthy
      litellm:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:8789/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Browser Automation Sidecar (Webwright + Playwright) ─────────
  browser-service:
    build:
      context: .
      dockerfile: config/browser-service/Dockerfile
    container_name: leankernel-browser-service
    environment:
      - API_TOKEN=${BROWSER_SERVICE_API_TOKEN:-}
      - LITELLM_BASE_URL=http://litellm:4000
      - LITELLM_API_KEY=${BROWSER_SERVICE_LITELLM_KEY:-}
      - WEBWRIGHT_MODEL=${BROWSER_SERVICE_MODEL:-tool}
      - MAX_CONCURRENT_RUNS=${BROWSER_SERVICE_MAX_CONCURRENT_RUNS:-2}
      - MAX_QUEUE_DEPTH=${BROWSER_SERVICE_MAX_QUEUE_DEPTH:-20}
      - RUN_WALL_CLOCK_SECONDS=${BROWSER_SERVICE_RUN_WALL_CLOCK_SECONDS:-600}
      - ARTIFACT_TTL_HOURS=${BROWSER_SERVICE_ARTIFACT_TTL_HOURS:-24}
      - DOMAIN_ALLOWLIST=${BROWSER_SERVICE_DOMAIN_ALLOWLIST:-}
      - DOMAIN_DENYLIST=${BROWSER_SERVICE_DOMAIN_DENYLIST:-}
      - TZ=${TZ:-America/Toronto}
    volumes:
      - browserdata:/app/outputs
    ports:
      - "${BROWSER_SERVICE_PORT:-8000}:8000"
    depends_on:
      litellm:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import sys,urllib.request; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=5).getcode() == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3

  # signal:
  #   image: bbernhard/signal-cli-rest-api:latest
  #   environment:
  #     - MODE=json-rpc
  #   volumes:
  #     - ./data/signal:/home/.local/share/signal-cli
  #   ports:
  #     - "8080:8080"
  #   restart: unless-stopped

  # emanate (social media automation) — uncomment to enable local dev
  # Build: cd ../emanate && docker compose build
  # emanate:
  #   image: ghcr.io/achingono/emanate-api:latest
  #   container_name: leankernel-emanate
  #   environment:
  #     PORT: "3000"
  #     NODE_ENV: production
  #     DATABASE_URL: postgresql://leankernel:leankernel-dev-password@database:5432/emanate
  #     LITELLM_URL: http://litellm:4000
  #     LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-leankernel-local}
  #     PLAYWRIGHT_WS_ENDPOINT: ""
  #     HEADLESS: "true"
  #     LOG_LEVEL: info
  #   ports:
  #     - "${EMANATE_PORT:-3000}:3000"
  #   depends_on:
  #     database:
  #       condition: service_healthy
  #   restart: unless-stopped

  # ── LeanKernel Engine (Core Application) ──────────────────────
  engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: leankernel-engine
    environment:
      - DOTNET_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5080
      - LEANKERNEL__LITELLM__BASEURL=http://litellm:4000
      - LEANKERNEL__LITELLM__APIKEY=${LITELLM_MASTER_KEY:-sk-leankernel-local}
      - LEANKERNEL__LITELLM__DEFAULTMODEL=${DEFAULT_MODEL:-tool}
      - LEANKERNEL__LITELLM__CONTEXTWINDOWTOKENS=${CONTEXT_WINDOW_TOKENS:-128000}
      - LEANKERNEL__HISTORY__COMPACTIONMODEL=${COMPACTION_MODEL:-small}
      - LEANKERNEL__LEARNING__EXTRACTIONMODEL=${EXTRACTION_MODEL:-small}
      - LEANKERNEL__ROUTING__ECONOMY__MODEL=${ECONOMY_MODEL:-small}
      - LEANKERNEL__ROUTING__STANDARD__MODEL=${STANDARD_MODEL:-medium}
      - LEANKERNEL__ROUTING__PREMIUM__MODEL=${PREMIUM_MODEL:-large}
      - LEANKERNEL__GBRAIN__BASEURL=http://gbrain:8789
      - LEANKERNEL__GBRAIN__AUTHTOKEN=${GBRAIN_AUTH_TOKEN:-}
      - LEANKERNEL__GBRAIN__TIMEOUTSECONDS=30
      - LEANKERNEL__BROWSERSERVICE__ENABLED=${BROWSER_SERVICE_ENABLED:-false}
      - LEANKERNEL__BROWSERSERVICE__BASEURL=http://browser-service:8000
      - LEANKERNEL__BROWSERSERVICE__DEFAULTMODEL=${BROWSER_SERVICE_MODEL:-tool}
      - LEANKERNEL__BROWSERSERVICE__APITOKEN=${BROWSER_SERVICE_API_TOKEN:-}
      - LEANKERNEL__DATABASE__CONNECTIONSTRING=Host=database;Database=${POSTGRES_DB:-leankernel};Username=${POSTGRES_USER:-leankernel};Password=${POSTGRES_PASSWORD:-leankernel-dev-password}
      - LEANKERNEL__DIAGNOSTICS__ENABLED=true
      - LEANKERNEL__DIAGNOSTICS__PERSISTTODATABASE=true
      - LEANKERNEL__DOCUMENTINGESTION__WATCHFOLDERENABLED=true
      - LEANKERNEL__DOCUMENTINGESTION__WATCHFOLDERPATH=/app/data/documents
      - LEANKERNEL__DOCUMENTINGESTION__WATCHINCLUDESUBDIRECTORIES=true
      - LEANKERNEL__DOCUMENTINGESTION__WATCHPOLLINGINTERVALSECONDS=30
      - LEANKERNEL__DOCUMENTINGESTION__MANAGEDSTORAGEPATH=/app/data/managed-documents
      - LEANKERNEL__GATEWAY__APIKEY=${GATEWAY_API_KEY:-}
      - TZ=${TZ:-America/Toronto}
    volumes:
      - ./data/skills:/app/data/skills:ro
      - ./data/wiki:/app/data/wiki:ro
      - ./data/documents:/app/data/documents
      - document-managed-data:/app/data/managed-documents
      - gbrain-data:/app/data/gbrain:ro
    ports:
      - "${ENGINE_PORT:-5080}:5080"
    depends_on:
      database:
        condition: service_healthy
      litellm:
        condition: service_healthy
      gbrain:
        condition: service_healthy
      browser-service:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  database-data:
  gbrain-data:
  document-managed-data:
  browserdata:
