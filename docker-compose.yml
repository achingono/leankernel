services:
    # ── Postgres Database (Source of Truth) ────────────────────────
  database:
    image: pgvector/pgvector:pg16
    container_name: leankernel-database
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-leankernel}
      - POSTGRES_USER=${POSTGRES_USER:-leankernel}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-leankernel-dev-password}
      - TZ=${TZ:-America/Toronto}
    volumes:
      - database-data:/var/lib/postgresql/data
      - ./scripts/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-leankernel} -d ${POSTGRES_DB:-leankernel}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Cache & Pub/Sub) ─────────────────────────────────
  redis:
    image: redis:8-alpine
    volumes:
      - ./config/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - ./config/redis/entrypoint.sh:/run/wrapper/entrypoint.sh:ro
      - redis-data:/data
    command: ["/bin/sh", "/run/wrapper/entrypoint.sh"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli -a \"$$(cat /run/secrets/redis_password | tr -d '\\r\\n')\" ping | grep -q PONG",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── LiteLLM (Model Proxy) ─────────────────────────────────────
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: leankernel-litellm
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-leankernel-local}
      - POSTGRES_HOST=database
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-leankernel}
      - POSTGRES_USER=${POSTGRES_USER:-leankernel}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-leankernel-dev-password}
      - LITELLM_DB_SCHEMA=${LITELLM_DB_SCHEMA:-litellm}
      - PYTHONPATH=/app/config
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_API_KEY_2=${GROQ_API_KEY_2:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_API_KEY_2=${GEMINI_API_KEY_2:-}
      - GEMINI_API_KEY_3=${GEMINI_API_KEY_3:-}
      - AZURE_AI_API_KEY=${AZURE_AI_API_KEY:-}
      - AZURE_AI_API_BASE=${AZURE_AI_API_BASE:-}
      - AZURE_AI_API_KEY_2=${AZURE_AI_API_KEY_2:-}
      - AZURE_AI_API_BASE_2=${AZURE_AI_API_BASE_2:-}
      - GITHUB_COPILOT_OAUTH_TOKEN=${GITHUB_COPILOT_OAUTH_TOKEN:-}
      - GITHUB_COPILOT_API_BASE=${GITHUB_COPILOT_API_BASE:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-}
      - NVIDIA_API_BASE=${NVIDIA_API_BASE:-}
      - TZ=${TZ:-America/Toronto}
    volumes:
      - ./config/litellm:/app/config:rw
    extra_hosts:
      - "host.docker.internal:host-gateway"
    entrypoint: ["sh", "-c"]
    command: ["set -eu; ENCODED_POSTGRES_PASSWORD=$$(python3 -c \"import os, urllib.parse; print(urllib.parse.quote(os.environ['POSTGRES_PASSWORD']))\"); export DATABASE_URL=postgresql://$${POSTGRES_USER}:$${ENCODED_POSTGRES_PASSWORD}@$${POSTGRES_HOST}:$${POSTGRES_PORT}/$${POSTGRES_DB}?schema=$${LITELLM_DB_SCHEMA}; python3 /app/config/render_config.py /app/config/config.yaml /app/config/config.generated.yaml && exec litellm --config /app/config/config.generated.yaml --port 4000"]
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import sys,urllib.request; sys.exit(0 if urllib.request.urlopen('http://localhost:4000/health/liveliness', timeout=5).getcode() == 200 else 1)"]
      interval: 15s
      timeout: 10s
      start_period: 120s
      retries: 5

  # ── GBrain (Wiki/Memory MCP Server) ───────────────────────────
  gbrain:
    build:
      context: .
      dockerfile: config/gbrain/Dockerfile
    container_name: leankernel-gbrain
    working_dir: /app/data/wiki
    environment:
      - POSTGRES_HOST=database
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-leankernel}
      - POSTGRES_USER=${POSTGRES_USER:-leankernel}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-leankernel-dev-password}
      - GBRAIN_DB_URL=${GBRAIN_DB_URL:-}
      - GBRAIN_EMBEDDING_MODEL=${GBRAIN_EMBEDDING_MODEL:-openai:embedding}
      - GBRAIN_EMBEDDING_DIMENSIONS=${GBRAIN_EMBEDDING_DIMENSIONS:-3072}
      - GBRAIN_DREAM_REASONING_MODEL=${GBRAIN_DREAM_REASONING_MODEL:-openai:medium}
      - GBRAIN_DREAM_UTILITY_MODEL=${GBRAIN_DREAM_UTILITY_MODEL:-openai:small}
      - LITELLM_BASE_URL=${LITELLM_BASE_URL:-http://litellm:4000}
      - LITELLM_API_KEY=${LITELLM_MASTER_KEY:-sk-leankernel-local}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - TZ=${TZ:-America/Toronto}
    volumes:
      - ./data/wiki:/app/data/wiki
      - gbrain-data:/app/data/gbrain
    ports:
      - "${GBRAIN_PORT:-8789}:8789"
    depends_on:
      database:
        condition: service_healthy
      litellm:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:8789/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Playwright (Browser Engine Run-Server) ─────────────────────
  # Shared Chromium browser pool exposed via WebSocket on port 6000.
  # Used by both the Webwright sidecar (LLM-driven) and the Playwright
  # sidecar (direct operations) for browser automation.
  playwright:
    image: mcr.microsoft.com/playwright:v${PLAYWRIGHT_VERSION:-1.60.0}-noble
    container_name: leankernel-playwright
    environment:
      - TZ=${TZ:-America/Toronto}
      - PLAYWRIGHT_VERSION=${PLAYWRIGHT_VERSION:-1.60.0}
    command: ["/bin/sh", "-c", "npx -y playwright@${PLAYWRIGHT_VERSION:-1.60.0} run-server --port 6000 --host 0.0.0.0"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6000/"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - browserdata:/home/pwuser/outputs
    shm_size: 1gb
    restart: unless-stopped

  # ── Webwright (Python MCP Server) ─────────────────────────────
  # Single Python container: FastMCP server on port 8000 serves the
  # browser automation tools.  Each run spawns run_cli.py which
  # connects to the shared Playwright service via WebSocket.
  webwright:
    build:
      context: .
      dockerfile: config/webwright/Dockerfile
    container_name: leankernel-webwright
    user: "0:0"
    environment:
      - TZ=${TZ:-America/Toronto}
      - OUTPUT_ROOT=/home/webwright/outputs
      - WEBWRIGHT_RUN_TIMEOUT_MS=${WEBWRIGHT_RUN_TIMEOUT_MS:-120000}
      - RUN_WALL_CLOCK_SECONDS=${RUN_WALL_CLOCK_SECONDS:-120}
      - PLAYWRIGHT_WS_ENDPOINT=ws://playwright:6000/
      - LITELLM_BASE_URL=${LITELLM_BASE_URL:-http://litellm:4000}
      - LITELLM_API_KEY=${LITELLM_MASTER_KEY:-sk-leankernel-local}
      - WEBWRIGHT_MODEL=${LEANKERNEL_DEFAULT_MODEL:-medium}
    volumes:
      - browserdata:/home/webwright/outputs
    ports:
      - "${WEBWRIGHT_PORT:-8000}:8000"
    depends_on:
      playwright:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/ping || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  gateway:
    build:
      context: .
      dockerfile: src/Services/LeanKernel.Gateway/Dockerfile
      # Dockerfile stages are: source, watch, build, final.
      # Default to `final` so `docker compose up` works without extra env vars.
      target: ${LEANKERNEL_ENGINE_TARGET:-final}
    container_name: leankernel-gateway
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=${LEANKERNEL_GATEWAY_PORT:-8080}
      - BRAVE_API_KEY=${BRAVE_API_KEY:-}
      - CONNECTIONSTRINGS__POSTGRES=Host=database;Port=5432;Database=${POSTGRES_DB:-leankernel};Username=${POSTGRES_USER:-leankernel};Password=${POSTGRES_PASSWORD:-leankernel-dev-password}
      - OPENAI__BASEURL=${LITELLM_BASE_URL:-http://litellm:4000}/v1
      - OPENAI__APIKEY=${LITELLM_MASTER_KEY:-sk-leankernel-local}
      - OPENAI__DEFAULTMODEL=${LEANKERNEL_DEFAULT_MODEL:-medium}
      - OPENAI__MEMORY__MODELID=${LEANKERNEL_MEMORY_MODEL:-small}
      - OPENAI__FACTEXTRACTION__MODELID=${LEANKERNEL_FACT_EXTRACTION_MODEL:-small}
      - GBRAIN__BASEURL=http://gbrain:8789
      - FILES__ROOTPATH=/app/data
      - FILES__SCRATCHROOT=/app/scratch
      - AGENTS__TOOLS__DOCUMENTINGESTION__ENABLED=${DOCUMENT_INGESTION_ENABLED:-true}
      - AGENTS__TOOLS__MCPSERVERS__0__NAME=webwright
      - AGENTS__TOOLS__MCPSERVERS__0__ENABLED=${WEBWRIGHT_MCP_ENABLED:-false}
      - AGENTS__TOOLS__MCPSERVERS__0__ENDPOINT=http://webwright:8000/mcp
      - AGENTS__TOOLS__MCPSERVERS__0__TRANSPORTMODE=${WEBWRIGHT_MCP_TRANSPORT_MODE:-AutoDetect}
      - AGENTS__TOOLS__MCPSERVERS__0__CONNECTIONTIMEOUTSECONDS=${WEBWRIGHT_MCP_TIMEOUT_SECONDS:-30}
      - AGENTS__TOOLS__MCPSERVERS__0__REQUIRED=${WEBWRIGHT_MCP_REQUIRED:-false}
      - TZ=${TZ:-America/Toronto}
    volumes:
      - gateway-data:/app/data
      - gateway-scratch:/app/scratch
      - ./data/watch:/app/watch
      - gbrain-data:/app/data/gbrain:ro
    ports:
      - "${LEANKERNEL_GATEWAY_PORT:-8080}:${LEANKERNEL_GATEWAY_PORT:-8080}"
    depends_on:
      database:
        condition: service_healthy
      litellm:
        condition: service_healthy
      gbrain:
        condition: service_healthy
      webwright:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:${LEANKERNEL_GATEWAY_PORT:-8080}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  signal-terminal:
    build:
      context: .
      dockerfile: src/Terminals/LeanKernel.Channels.Signal/Dockerfile
    container_name: leankernel-signal-terminal
    environment:
      - DOTNET_ENVIRONMENT=Development
      - CONNECTIONSTRINGS__POSTGRES=Host=database;Port=5432;Database=${POSTGRES_DB:-leankernel};Username=${POSTGRES_USER:-leankernel};Password=${POSTGRES_PASSWORD:-leankernel-dev-password}
      - GATEWAY__BASEURL=http://gateway:${LEANKERNEL_GATEWAY_PORT:-8080}
      - GATEWAY__MODEL=${LEANKERNEL_DEFAULT_MODEL:-medium}
      - SIGNAL__HOST=${SIGNAL_SOCKET_HOST:-signal-cli}
      - SIGNAL__PORT=${SIGNAL_SOCKET_PORT:-8080}
      - TZ=${TZ:-America/Toronto}
    depends_on:
      database:
        condition: service_healthy
      gateway:
        condition: service_healthy
      signal-cli:
        condition: service_started
    restart: unless-stopped

  signal-cli:
    image: bbernhard/signal-cli-rest-api:latest
    container_name: leankernel-signal-cli
    environment:
      - MODE=json-rpc
      - TZ=${TZ:-America/Toronto}
    volumes:
      - signal-data:/home/.local/share/signal-cli
    ports:
      - "${SIGNAL_CLI_PORT:-8081}:8080"
    restart: unless-stopped

  teams-terminal:
    build:
      context: .
      dockerfile: src/Terminals/LeanKernel.Channels.Teams/Dockerfile
    container_name: leankernel-teams-terminal
    environment:
      - DOTNET_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=${TEAMS_TERMINAL_PORT:-3978}
      - CONNECTIONSTRINGS__POSTGRES=Host=database;Port=5432;Database=${POSTGRES_DB:-leankernel};Username=${POSTGRES_USER:-leankernel};Password=${POSTGRES_PASSWORD:-leankernel-dev-password}
      - GATEWAY__BASEURL=http://gateway:${LEANKERNEL_GATEWAY_PORT:-8080}
      - GATEWAY__MODEL=${LEANKERNEL_DEFAULT_MODEL:-medium}
      - BOT__APPID=${TEAMS_APP_ID:-}
      - BOT__APPPASSWORD=${TEAMS_APP_PASSWORD:-}
      - BOT__AUTHORITY=${TEAMS_AUTHORITY:-https://login.microsoftonline.com}
      - TZ=${TZ:-America/Toronto}
    ports:
      - "${TEAMS_TERMINAL_PORT:-3978}:${TEAMS_TERMINAL_PORT:-3978}"
    depends_on:
      database:
        condition: service_healthy
      gateway:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:${TEAMS_TERMINAL_PORT:-3978}/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  database-data:
  gateway-data:
  gateway-scratch:
  gbrain-data:
  signal-data:
  browserdata:
  redis-data:
